<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arrays and Loops</title>

</head>
<body>
  
  <script>
    /*
      Arrays:
      -another type of value
      - represents a list of values
      - it is a special type of object
      
      * an Array can have any type of value (can have different types at the same array)
      * an Array is also a value
    */
    const myArray = [10, 20, 30];
    [1, 'hello', true, {name: 'socks'}, [1, 2]]
    
    console.log(myArray);
    console.log(typeof [1, 2])
    console.log(Array.isArray(myArray));
    
    /*
      some methods for arrays:
    */
    myArray.push(100);
    myArray.length;
    myArray.splice(0, 1) //first number is the index we want to remove, second is the number of values to remove
    myArray.reverse() // reverse the array
    let copyMyArray = myArray.slice(); this makes a copy not a reference
    
    const [firstValue, secondValue] = [1, 2, 3]; // a way to store arrayVar in a different variables
    
    let i = 0;
    
    while (i < 10){
      console.log('fuck you, using while loop');
      i++;
    }
    for (let i = 0; i < 10; i++){
      console.log('fuck you, using for loop');
    }
    // Standard loop => for
    // Non-standard loop => whiles
    
    let randomNumber = 0;
    while (randomNumber < 0.5){
      randomNumber = Math.random();
    }
    console.log(randomNumber);
    
    const todoList = ['make dinner','wash dishes','watch youtube'];
    for (let i = 0; i < todoList.length; i++){
      console.log(todoList[i]);
    }
    
    /*
      Accumulator Pattern: النمط التراكمي
      1. Create a variable to store the result.
      2. Loop through the array and update the result.
    */
    const nums = [1, 1, 3];
    const numsCopy =[];
    let total = 0;
    for(let i = 0; i < nums.length; i++){
      total += nums[i];
      numsCopy.push(nums[i]);
    }
    console.log(total);
    console.log(numsCopy);
    // Challenge Exercises
    let words = ['apple', 'grape', 'apple', 'banana', 'banana', 'apple'];
    
    function countWords(words){
      let result = {};
      for(let i = 0; i < words.length; i++){
        if(!result[words[i]])
          result[words[i]] = 1;
        else
          result[words[i]]++;
      }
      return result;
    }
    console.log(countWords(words));// apple: 3, grape: 1, banana: 2
    
  </script>
</body>
