<!DOCTYPE html>
<html lang="en">
  <head>
    <title>HTML,CSS,JS,Together</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
      }
      
      .subscribe-button{
        border: none;
        background-color: black;
        color: white;
        padding: 10px 15px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 30px;
      }
      .is-subscribed{
        background-color:rgb(240, 240, 240);
        color: black;
      }
      .cost-input{
        font-size: 15px;
        padding: 10px;
      }
      .calculate-button{
        font-size: 15px;
        padding: 11px;
        background-color: green;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- the element can have more than one class by separating them with a space -->
    
    <p>YouTube Subscribe Button</p>
    <button class="subscribe-button js-subscribe-button" onclick="subscribe()">Subscribe</button>

    <p class="shipping-calculator-title">Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping.<br></p>
    <p>Orders over $40 = FREE shipping.</p>
    <p>
      <input placeholder="Cost of order" class="cost-input js-cost-input" onkeydown="handleCostInputKeydown(event)">
      <button class="calculate-button" onclick="calculateTotal()">Calculate</button>
    </p>
    <p class="js-total"></p>

    <p class="rock-paper-scissors-title">Rock Paper Scissors</p>
    <a href="https://supersimple.dev/projects/rock-paper-scissors">
      Click here
    </a>

    <script>
      /*
          .classList property gives us control of the class attribute
      */
      function handleCostInputKeydown(event) {
        const key = event.key;
        
        if (key === 'Enter') {
          calculateTotal();
        } else if (key === 'Escape') {
          document.querySelector('.cost-input').value = '';
        }
      }
      
      function subscribe() {
        const subscribeButton = document.querySelector('.js-subscribe-button');
        // when we click the button,
        // 1.add a class
        // 2.This class will have different styles
        if (subscribeButton.innerText === 'Subscribe') {
          subscribeButton.innerHTML = 'Subscribed';
          subscribeButton.classList.add('is-subscribed'); // create the class
          
        } else {
          subscribeButton.innerHTML = 'Subscribe';
          subscribeButton.classList.remove('is-subscribed'); // remove the class
        }
      }
      
      function calculateTotal() {
        const inputElement = document.querySelector('.js-cost-input');
        const cost = Number(inputElement.value) * 100;
        
        if (cost < 3500) {
          document.querySelector('.js-total')
                          .innerHTML = `$${(cost + 1000) / 100}`;
        } else {
          document.querySelector('.js-total')
                          .innerHTML = `$${cost / 100}`;
        }
      }
    </script>
  </body>
</html>
