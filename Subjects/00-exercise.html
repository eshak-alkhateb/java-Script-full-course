<!DOCTYPE html>
<html lang="en" >
  <head>
    <meta charset="UTF-8" >
    <title >Exercise</title >
    <style>
    
    </style>
  </head>
  <body>
    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10</p>
    <p>Orders over $40 = FREE shipping.</p>
    <label><input class="js-cost-input" type="number" placeholder="Cost of order" onkeydown="handleCostKeydown(event);"></label>
    <button onclick=" calculateTotal();">Calculate</button>
    <p class="js-final-price">final price:</p>
    <script>
      function handleCostKeydown(event){
        if(event.key === 'Enter')
          calculateTotal();
      }
      
      function calculateTotal(){
        const inputElement = document.querySelector('.js-cost-input');
        let cost = Number(inputElement.value); // Whenever we get a value from the DOM, the value will be a string
        if(cost < 40)
          cost = cost + 10;
        
        document.querySelector('.js-final-price').innerHTML = `$${cost}`;
      }
    </script>
  </body>
</html>
