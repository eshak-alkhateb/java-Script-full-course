<!DOCTYPE html>
<html lang="en" >
  <head>
    <meta charset="UTF-8" >
    <title >Buttons</title >
    <style>
      button{
        width:150px;
        height:150px;
        font-size:50px;
      }
      p{
        font-size:50px;
      }
    </style>
  </head>
  <body onclick="document.getElementById('result').innerHTML=calculation;">
    <p>Calculator</p>
    <button onclick="updateCalculation(0);">0</button>
    <button onclick="updateCalculation(1);">1</button>
    <button onclick="updateCalculation(2);">2</button>
    <button onclick="updateCalculation(3);">3</button>
    <button onclick="updateCalculation(4);">4</button>
    <button onclick="updateCalculation(5);">5</button><br><br>
    <button onclick="updateCalculation(6);">6</button>
    <button onclick="updateCalculation(7);">7</button>
    <button onclick="updateCalculation(8);">8</button>
    <button onclick="updateCalculation(9);">9</button><br><br>
    <button onclick="updateCalculation('+');">+</button>
    <button onclick="updateCalculation('-');">-</button>
    <button onclick="updateCalculation('*');">*</button>
    <button onclick="document.getElementById('result').innerHTML=(calculation = eval(calculation));">=</button><br><br>
    <button onclick="calculation=''">Clear</button>
    <p id="result"></p>
    
    
    <script>
      let calculation ='';
      
      function updateCalculation(addCalculation){
        return calculation+=addCalculation;
      }

      */
    </script>
  </body>
</html>
