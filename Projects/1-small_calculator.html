<!DOCTYPE html>
<html lang="en" >
  <head>
    <meta charset="UTF-8" >
    <title >Buttons</title >
    <style>
      button{
        width:150px;
        height:150px;
        font-size:50px;
      }
      p{
        font-size:50px;
      }
    </style>
  </head>
  <body onclick="document.getElementById('result').innerHTML=calculation;">
    <p>Calculator</p>
    <button onclick="calculation+='0';">0</button>
    <button onclick="calculation+='1';">1</button>
    <button onclick="calculation+='2';">2</button>
    <button onclick="calculation+='3';">3</button>
    <button onclick="calculation+='4';">4</button>
    <button onclick="calculation+='5';">5</button><br><br>
    <button onclick="calculation+='6';">6</button>
    <button onclick="calculation+='7';">7</button>
    <button onclick="calculation+='8';">8</button>
    <button onclick="calculation+='9';">9</button><br><br>
    <button onclick="calculation+='+';">+</button>
    <button onclick="calculation+='-';">-</button>
    <button onclick="calculation+='*';">*</button>
    <button onclick="document.getElementById('result').innerHTML=(calculation = eval(calculation));">=</button><br><br>
    <button onclick="calculation=''">Clear</button>
    <p id="result"></p>
    
    
    <script>
      let calculation ='';
      
      let name = 'Eshak Alkhateb';
      let cost = 20;
      let tax = cost * 0.1;
      console.log(`My name is: ${name}`);
      console.log(`Cost of food: $${cost}`);
      console.log(`tax is: $${tax}`);
      console.log(`total cost: $${cost + tax}`);
    </script>
  </body>
</html>
