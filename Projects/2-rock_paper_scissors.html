<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <!--
    stages:
    1_stage: create the project.
    2_stage: add functions.
    3_stage: add objects.
    4_stage: add local storage
    -->
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    
    <button onclick="playGame('rock');">Rock</button>
    
    <button onclick="playGame('paper');">Paper</button>
    
    <button onclick="playGame('scissors');">Scissors</button>
    
    <button onclick="
    score.wins = 0;
    score.loses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    ">Reset Score</button>
    
    <script>
      // bring the new score that we saved from the localStorage using getItem() function
      // but first we should convert our code to JS language using JSON.parse
       let score = JSON.parse(localStorage.getItem
       ('score')) || {
         wins: 0,
         losses: 0,
         ties: 0
       };
       // * Note: we use || operator if we remove the object then refresh the page, does not give us an error and create a new one
      
       /*
       //this code does the same above in shorter way
       if(!score){
         score = {
           wins: 0,
           loses: 0,
           ties: 0
         }
       }
       */
       
       function playGame(userMove){
         let randomNumber = Math.random();
         let computerMove = '';
         let result;
         
         // choose the computer's move
         if(randomNumber >= 0 && randomNumber < 1 / 3){
           computerMove = 'rock';
         }
         else if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
           computerMove = 'paper';
         }
         else if(randomNumber >= 2 / 3 && randomNumber < 1){
           computerMove = 'scissors';
         }
         
         // compare the two moves
         if(computerMove === userMove){
           result = '.Tie.';
         }
         else if(computerMove === 'scissors' && userMove === 'paper'){
           result = '.You lose.';
         }
         else if(computerMove === 'rock' && userMove === 'scissors'){
           result = '.You lose.';
         }
         else if(computerMove === 'paper' && userMove === 'rock'){
           result = '.You lose.';
         }
         else{
           result = '.You win.';
         }
         
         if(result === '.Tie.')
           score.ties += 1;
         else if(result === '.You lose.')
           score.loses += 1;
         else
           score.wins += 1;
         
         // save the score in local storage using setItem() function
         localStorage.setItem('score',JSON.stringify(score));
         
         alert(`You picked ${userMove} computer picked ${computerMove} ${result}\nwins: ${score.wins} loses: ${score.loses} ties: ${score.ties}`);
       }
       // Notes:
       // * Best practice is to keep variables inside a scope (if we can)
    </script>
  </body>
</html>
