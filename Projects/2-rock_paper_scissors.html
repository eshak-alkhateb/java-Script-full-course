<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    
    <button onclick="playGame('rock');">Rock</button>
    
    <button onclick="playGame('paper');">Paper</button>
    
    <button onclick="playGame('scissors');">Scissors</button>
    
    <script>
      
       function playGame(userMove){
         let randomNumber = Math.random();
         let computerMove = '';
         let result;
         
         // choose the computer's move
         if(randomNumber >= 0 && randomNumber < 1 / 3){
           computerMove = 'rock';
         }
         else if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
           computerMove = 'paper';
         }
         else if(randomNumber >= 2 / 3 && randomNumber < 1){
           computerMove = 'scissors';
         }
         
         // compare the two moves
         if(computerMove === userMove){
           result = '.Tie.';
         }
         else if(computerMove === 'scissors' && userMove === 'paper'){
           result = '.You lose1.';
         }
         else if(computerMove === 'rock' && userMove === 'scissors'){
           result = '.You lose.';
         }
         else if(computerMove === 'paper' && userMove === 'rock'){
           result = '.You lose.';
         }
         else{
           result = '.You win.';
         }
         alert(`you picked ${userMove} computer picked ${computerMove} ${result}`);
         console.log(`you picked ${userMove} computer picked ${computerMove} ${result}`);
       }
      // Notes:
       // * Best practice is to keep variables inside a scope (if we can)
    </script>
  </body>
</html>
